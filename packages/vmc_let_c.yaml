    modbus_controller_id: vmc_ctrl
    name: "VMC Speed"
    address: 0
    value_type: U_WORD
    optimistic: false
    optionsmap:
      "Off": 0
      "Velocita1": 1
      "Velocita2": 2
      "Velocita3": 3
      "Velocita auto1": 4
      "Velocita auto2": 5

  - platform: modbus_controller
