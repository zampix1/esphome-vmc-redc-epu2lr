substitutions:
  modbus_tx_pin: GPIO17
  modbus_rx_pin: GPIO18
  modbus_flow_control_pin: GPIO21
  modbus_address: "1"
  modbus_baud_rate: "9600"
  modbus_stop_bits: "2"
  modbus_parity: NONE
  modbus_send_wait_time: 150ms
  vmc_update_interval: 10s
  vmc_command_throttle: 100ms

uart:
  id: uart_modbus
  tx_pin: ${modbus_tx_pin}
  rx_pin: ${modbus_rx_pin}
  baud_rate: ${modbus_baud_rate}
  stop_bits: ${modbus_stop_bits}
  parity: ${modbus_parity}

modbus:
  id: mb_vmc
  uart_id: uart_modbus
  flow_control_pin: ${modbus_flow_control_pin}
  send_wait_time: ${modbus_send_wait_time}

modbus_controller:
  - id: vmc_ctrl
    address: ${modbus_address}
    modbus_id: mb_vmc
    update_interval: ${vmc_update_interval}
    command_throttle: ${vmc_command_throttle}
    on_online:
      then:
        - binary_sensor.template.publish:
            id: vmc_online
            state: ON
    on_offline:
      then:
        - binary_sensor.template.publish:
            id: vmc_online
            state: OFF

binary_sensor:
  - platform: template
    id: vmc_online
    name: "VMC Online"
    device_class: connectivity

  - platform: status
    name: "VMC Gateway Status"

  - platform: modbus_controller
    modbus_controller_id: vmc_ctrl
    name: "VMC Allarme Attivo"
    register_type: holding
    address: 10
    bitmask: 1

  - platform: modbus_controller
