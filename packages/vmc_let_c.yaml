    modbus_controller_id: vmc_ctrl
    id: vmc_set_temperatura_inverno_raw
    internal: true
    name: "VMC Set Temperatura Inverno Raw"
    address: 99
    value_type: U_WORD
    min_value: 0
    max_value: 50
    step: 0.1
    unit_of_measurement: "°C"
    lambda: "return x * 0.1f;"
