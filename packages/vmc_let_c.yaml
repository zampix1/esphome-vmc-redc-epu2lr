text_sensor:
  - platform: template
    name: "VMC Current Speed"
    lambda: |-
      if (!id(vmc_velocita_attiva_vmc).has_state()) return {"unknown"};
      switch ((int) id(vmc_velocita_attiva_vmc).state) {
        case 0: return {"Off"};
        case 1: return {"Velocita1"};
        case 2: return {"Velocita2"};
        case 3: return {"Velocita3"};
        case 4: return {"Velocita auto1"};
        case 5: return {"Velocita auto2"};
        case 6: return {"Velocita1 STBY"};
        case 7: return {"Velocita2 STBY"};
        case 8: return {"Velocita3 STBY"};
        case 9: return {"Velocita auto1 STBY"};
        case 10: return {"Velocita auto2 STBY"};
        case 11: return {"OFF remoto"};
        case 12: return {"Velocita1 remoto"};
        case 13: return {"Velocita2 remoto"};
        case 14: return {"Velocita3 remoto"};
        case 15: return {"Velocita auto1 remoto"};
        case 16: return {"Velocita auto2 remoto"};
        case 17: return {"Manutenzione"};
        default: return {"unknown"};
      }
    update_interval: 10s

  - platform: template
    name: "VMC Modalita Attiva Testo"
    lambda: |-
      if (!id(vmc_modalita_attiva).has_state()) return {"unknown"};
      switch ((int) id(vmc_modalita_attiva).state) {
        case 0: return {"Off"};
        case 1: return {"Ventilazione"};
        case 2: return {"Deumidifica"};
        case 3: return {"Integrazione"};
        case 4: return {"Deum+Integ"};
        case 5: return {"Ricircolo"};
        case 6: return {"Vent+Deum"};
        case 7: return {"Vent+Integ"};
        case 8: return {"Vent+Deu+Int"};
        case 9: return {"Vent+Ricirc"};
        case 10: return {"Manutenzione"};
        case 11: return {"Stand-By"};
        case 12: return {"Deum STBY"};
        case 13: return {"Integ STBY"};
        case 14: return {"Deum+Integ STBY"};
        case 15: return {"Vent+Deum STBY"};
        case 16: return {"Vent+Integ STBY"};
        case 17: return {"Vent+Deu+Int STBY"};
        default: return {"unknown"};
      }
    update_interval: 10s

  - platform: template
    name: "VMC Evento Testo"
    lambda: |-
      if (!id(vmc_codice_evento).has_state()) return {"unknown"};
      switch ((int) id(vmc_codice_evento).state) {
        case 0: return {"Nessun evento"};
        case 1: return {"Reset allarmi"};
        case 2: return {"Reset filtri"};
        case 3: return {"Allarme alta pressione"};
        case 4: return {"Allarme bassa pressione"};
        case 5: return {"Allarme mancanza freon"};
        case 6: return {"Allarme alta temperatura H2O"};
        case 7: return {"Allarme bassa temperatura"};
        case 8: return {"Allarme NTC condensatore"};
        case 9: return {"Allarme NTC evaporatore"};
        case 10: return {"Allarme NTC ripresa"};
        case 11: return {"Allarme NTC immissione"};
        case 12: return {"Allarme NTC rinnovo"};
        case 13: return {"Allarme NTC H2O IN"};
        case 14: return {"Allarme sonda temperatura display"};
        case 15: return {"Allarme sonda umidita display"};
        case 16: return {"Allarme sonda temperatura CAN"};
        case 17: return {"Allarme sonda umidita CAN"};
        case 18: return {"Blocco da allarme filtri"};
        case 19: return {"Allarme filtri"};
        case 20: return {"Mancanza acqua fredda"};
        default: return {"Evento sconosciuto"};
      }
    update_interval: 10s

select:
