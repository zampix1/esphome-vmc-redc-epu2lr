    unit_of_measurement: "%"
    mode: box
    lambda: |-
      return roundf(id(vmc_set_umidita_inverno_raw).state);
    update_interval: 10s
    set_action:
      - lambda: |-
          float target = roundf(x);
          const float min_ur = roundf(id(vmc_set_min_ur_raw).state);
          if (!isnan(min_ur) && target < min_ur) target = min_ur;
          auto pwd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(id(vmc_ctrl), 174, 27);
          id(vmc_ctrl)->queue_command(pwd);
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(id(vmc_ctrl), 100, (uint16_t) (target * 10.0f));
