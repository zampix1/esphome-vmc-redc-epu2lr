    address: 25
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
      - lambda: |-
          if (x < -50.0f || x > 100.0f) return NAN;
          return x;

