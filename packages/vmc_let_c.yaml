  - platform: template
    name: "VMC Set Temperatura Inverno"
    min_value: 0
    max_value: 50
    step: 1
    unit_of_measurement: "°C"
    mode: box
    lambda: |-
      return roundf(id(vmc_set_temperatura_inverno_raw).state);
    update_interval: 10s
    set_action:
      - lambda: |-
          auto pwd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(id(vmc_ctrl), 174, 27);
          id(vmc_ctrl)->queue_command(pwd);
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(id(vmc_ctrl), 99, (uint16_t) (roundf(x) * 10.0f));
          id(vmc_ctrl)->queue_command(cmd);

  - platform: template
    name: "VMC Set Umidita Inverno"
    min_value: 30
    max_value: 90
